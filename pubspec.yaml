name: termux_assistant
description: A native Android APK that manages Termux locally.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  flutter_bloc: ^9.1.1
  fl_chart: ^1.1.0
  xterm: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
